title: DhivanSTech
tagline: "Engineering-grade components & tools for makers"
description: >-
  DhivanSTech (DST) is an electronics brand supplying tested DIY maker components
  and test equipment via Amazon. We also document real builds, experiments, and
  engineering projects.
baseurl: ""
url: "https://dhivans.github.io"
author: DhivanSTech

# Collections
collections:
  products:
    output: false
  projects:
    output: true
    permalink: /projects/:name/

# Default layouts per collection
defaults:
  - scope:
      path: ""
      type: projects
    values:
      layout: post

# Build settings
theme: minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - .gitignore
  - _site/
