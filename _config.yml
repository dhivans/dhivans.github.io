title: DhivanSTech
tagline: "Engineering-grade components & tools for makers"
description: >-
  DhivanSTech (DST) is an electronics brand supplying tested DIY maker components
  and test equipment via Amazon. We also document real builds, experiments, and
  engineering projects.
baseurl: ""
url: "https://dhivans.github.io"
author: DhivanSTech

# Collections
collections:
  products:
    output: true
    permalink: /shop/:name/
  projects:
    output: true
    permalink: /projects/:name/
  bundles:
    output: true
    permalink: /bundles/:name/

# Default layouts per collection
defaults:
  - scope:
      path: ""
      type: projects
    values:
      layout: post
  - scope:
      path: ""
      type: posts
    values:
      layout: post
  - scope:
      path: ""
      type: bundles
    values:
      layout: bundle

# Build settings
theme: minima
# date: front matter here is for display/sorting only, not scheduled
# publishing — don't let a CI runner's UTC clock silently 404 a page that
# was authored "today" in a timezone ahead of UTC.
future: true
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - .gitignore
  - _site/
  - vendor/
