---
layout: default
---

<article class="post h-entry" itemscope itemtype="https://schema.org/BlogPosting">
  <header class="post-header">
    <h1 class="post-title p-name" itemprop="name headline">{{ page.title | escape }}</h1>
    {% if page.date %}
    <p class="post-meta">
      <time class="dt-published" datetime="{{ page.date | date_to_xmlschema }}" itemprop="datePublished">
        {{ page.date | date: "%Y-%m-%d" }}
      </time>
    </p>
    {% endif %}
  </header>

  {% include parts-used.html %}

  <div class="post-content e-content" itemprop="articleBody">
    {{ content }}
  </div>
</article>

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Article",
  "headline": {{ page.title | jsonify }},
  "description": {{ page.description | default: site.description | jsonify }},
  "datePublished": {{ page.date | date_to_xmlschema | jsonify }},
  "author": {
    "@type": "Organization",
    "name": {{ site.author | default: site.title | jsonify }}
  },
  "publisher": {
    "@type": "Organization",
    "name": {{ site.title | jsonify }}
  },
  "mainEntityOfPage": {{ page.url | absolute_url | jsonify }}
}
</script>
