<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">

  {%- include head.html -%}

  <body{% if page.body_class %} class="{{ page.body_class }}"{% endif %}>

    <!-- Mobile hamburger toggle -->
    <button class="hamburger" id="hamburger" aria-label="Toggle navigation">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <!-- Mobile overlay -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    {%- include sidebar.html -%}

    <div class="page-wrapper" id="page-wrapper">
      <main class="page-content" aria-label="Content">
        <div class="wrapper">
          {{ content }}
        </div>
      </main>
      {%- include footer.html -%}
    </div>

    <script>
      (function () {
        var sidebar   = document.getElementById('sidebar');
        var hamburger = document.getElementById('hamburger');
        var overlay   = document.getElementById('sidebar-overlay');

        // --- Mobile toggle ---
        hamburger.addEventListener('click', function () {
          sidebar.classList.toggle('mobile-open');
          overlay.classList.toggle('active');
        });

        overlay.addEventListener('click', function () {
          sidebar.classList.remove('mobile-open');
          overlay.classList.remove('active');
        });

        // --- Shared product card filter ---
        function filterCards(query) {
          var cards = document.querySelectorAll('.product-card');
          if (cards.length === 0) return;
          query = (query || '').toLowerCase();
          cards.forEach(function (card) {
            var text = card.textContent.toLowerCase();
            card.style.display = (query === '' || text.indexOf(query) !== -1) ? '' : 'none';
          });
        }

        // --- Sidebar search ---
        var sidebarSearch = document.getElementById('sidebar-search');
        if (sidebarSearch) {
          sidebarSearch.addEventListener('input', function () {
            filterCards(this.value);
            var shopBar = document.getElementById('shop-search-bar');
            if (shopBar) shopBar.value = this.value;
          });

          sidebarSearch.addEventListener('keydown', function (e) {
            if (e.key === 'Enter' && this.value.trim()) {
              if (document.querySelectorAll('.product-card').length === 0) {
                window.location.href = '/shop/?q=' + encodeURIComponent(this.value.trim());
              }
            }
          });
        }

        // --- Shop page search bar ---
        var shopBar = document.getElementById('shop-search-bar');
        if (shopBar) {
          shopBar.addEventListener('input', function () {
            filterCards(this.value);
            if (sidebarSearch) sidebarSearch.value = this.value;
          });
        }

        // --- Apply ?q= URL param on shop page load ---
        var q = new URLSearchParams(window.location.search).get('q');
        if (q) {
          if (sidebarSearch) sidebarSearch.value = q;
          if (shopBar) shopBar.value = q;
          filterCards(q);
        }
      })();
    </script>

  </body>

</html>
