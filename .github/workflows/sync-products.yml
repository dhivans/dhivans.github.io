name: Sync Amazon Product Data

on:
  # Runs every night at 02:00 UTC
  schedule:
    - cron: '0 2 * * *'

  # Can also be triggered manually from the Actions tab
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit and push updated markdown files
      issues: write     # needed to open/update low-stock alerts

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          # Fetch full history so git push works without issues
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run product sync
        env:
          AMAZON_CLIENT_ID:      ${{ secrets.AMAZON_CLIENT_ID }}
          AMAZON_CLIENT_SECRET:  ${{ secrets.AMAZON_CLIENT_SECRET }}
          AMAZON_REFRESH_TOKEN:  ${{ secrets.AMAZON_REFRESH_TOKEN }}
          AMAZON_MARKETPLACE_ID: ${{ secrets.AMAZON_MARKETPLACE_ID }}
          AMAZON_SELLER_ID:      ${{ secrets.AMAZON_SELLER_ID }}
        run: python scripts/sync_products.py

      - name: Generate low-stock report
        id: stock_alert
        run: python scripts/check_stock_alerts.py --output low-stock-report.md

      - name: Open or update low-stock issue
        if: steps.stock_alert.outputs.count != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const title = 'DST low-stock alert';
            const body = fs.readFileSync('${{ steps.stock_alert.outputs.report_path }}', 'utf8');
            const { owner, repo } = context.repo;
            const issues = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              per_page: 100
            });
            const existing = issues.data.find((issue) => issue.title === title && !issue.pull_request);
            if (existing) {
              await github.rest.issues.update({ owner, repo, issue_number: existing.number, body });
            } else {
              await github.rest.issues.create({ owner, repo, title, body });
            }

      - name: Commit updated product files (if any changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage only generated product/catalogue data
          git add _products/ _data/catalog.json _data/history/ _data/price_changes.json

          # Check if there is anything to commit
          if git diff --cached --quiet; then
            echo "No product files changed — nothing to commit."
          else
            git commit -m "Auto-sync: update product catalogue data [skip ci]"
            git push
            echo "Changes committed and pushed."
          fi
